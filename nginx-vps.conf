server {
    listen 80;
    server_name speaksafe.network www.speaksafe.network;

    # Branding for SpeakSafe
    add_header X-Powered-By "SpeakSafe Network";

    location / {
        proxy_pass http://127.0.0.1:3012;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /api directly to the backend container to ensure speed
    location /api {
        proxy_pass http://127.0.0.1:3011/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
