version: '3.8'

services:
  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3011:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://speaksafe:${POSTGRES_PASSWORD}@postgres:5432/speaksafe
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - POLYGON_RPC_URL=${POLYGON_RPC_URL}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - IPFS_API_URL=http://ipfs:5001
      - IPFS_GATEWAY_URL=http://ipfs:8080
      - CORS_ORIGIN=http://speaksafe.network,https://speaksafe.network,http://82.112.255.81
      - API_VERSION=v1
    depends_on:
      - postgres
      - redis
      - ipfs
    networks:
      - speaksafe-production
    restart: unless-stopped
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
      - ./zk-circuits:/app/zk-circuits:ro

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3012:80"
    depends_on:
      - backend
    networks:
      - speaksafe-production
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=speaksafe
      - POSTGRES_USER=speaksafe
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5440:5432"
    volumes:
      - speaksafe_db_data:/var/lib/postgresql/data
    networks:
      - speaksafe-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speaksafe"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - speaksafe_redis_data:/data
    networks:
      - speaksafe-production
    restart: unless-stopped

  # IPFS Node
  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "4011:4001"
      - "5011:5001"
      - "8081:8080"
    volumes:
      - speaksafe_ipfs_data:/data/ipfs
    networks:
      - speaksafe-production
    restart: unless-stopped
    environment:
      - IPFS_PROFILE=server

volumes:
  speaksafe_db_data:
  speaksafe_redis_data:
  speaksafe_ipfs_data:

networks:
  speaksafe-production:
    driver: bridge
